<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garcia Tavern</title>
    <!-- Bootstrap Icons (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css">
    <!-- Anime.js (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        /* ----------------------------------------------
           color variables for the page
        ------------------------------------------------ */
        :root {
            --font: slategrey;
            --background: wheat;
            --menuColor: slategrey;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            background-image: url('https://images.unsplash.com/photo-1606625736768-f521ab7e23fb?ixlib=rb-1.2.1&q=80&fm=jpg&crop=entropy&cs=tinysrgb&dl=jeswin-thomas-PtfRiBumfQU-unsplash.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-color: wheat;
            color: white;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

        /* nav bar styling */
        .navBar {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.541);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            padding: 10px 20px;
        }

        .navBar nav ul {
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
            flex-wrap: wrap;
        }

        .navBar nav li {
            margin: 0 10px;
            padding: 5px 0;
        }

        .navBar a {
            text-decoration: none;
            color: white;
            transition: color 0.3s;
        }

        .navBar a:hover {
            color: dodgerblue;
        }

        #hamMenu {
            display: none;
            font-size: 25px;
            cursor: pointer;
            color: white;
        }

        /* header content */
        .header {
            width: 90%;
            max-width: 1200px;
            margin: 80px auto 40px auto;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 20px;
        }

        .IntroMsg {
            text-align: center;
            margin: 20px 0;
        }

        .logo {
            display: block;
            margin: 0 auto;
            animation: windowsFly ease-out 3s;
            box-shadow: inset 0 -3em 3em rgba(0, 0, 0, 0.1), 0 0 0 4px rgb(255, 255, 255), 0.3em 0.3em 4em rgba(0, 0, 0, 0.3);
            border-radius: 50%;
        }

        /* menu sections */
        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background-color: rgba(100, 98, 98, 0.288);
            border-radius: 15px;
            padding: 20px;
            margin: 30px 0;
            box-shadow: rgb(38, 57, 77) 0px 20px 30px -10px;
        }

        .menuIntro {
            text-align: center;
        }

        .menuIntro img {
            width: 100%;
            max-width: 400px;
            border-radius: 10%;
            box-shadow: rgb(38, 57, 77) 0px 20px 30px -10px;
            margin: 10px;
        }

        #home-menu {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 20px;
            color: #333;
        }

        #home-menu h2, #home-menu h3 {
            text-align: center;
            margin-bottom: 15px;
        }

        #home-menu ul {
            list-style: none;
            padding: 0;
        }

        #home-menu li {
            margin: 15px 0;
            border-bottom: 1px solid slategray;
            padding-bottom: 10px;
            overflow: hidden;
        }

        .dish {
            float: left;
            font-weight: bold;
            color: #555;
        }

        .Price {
            float: right;
            font-weight: bold;
            color: #555;
        }

        .Description {
            clear: both;
            display: block;
            color: #999;
            font-style: italic;
            font-size: 14px;
            margin-top: 5px;
        }

        /* responsive design */
        @media only screen and (max-width: 600px) {
            .navBar nav ul {
                flex-direction: column;
                display: none;
                width: 100%;
                background-color: rgba(0, 0, 0, 0.9);
                position: absolute;
                top: 50px;
                left: 0;
                padding: 10px 0;
            }
            .navBar nav li {
                margin: 10px 0;
                text-align: center;
            }
            #hamMenu {
                display: block;
                text-align: right;
                margin-right: 20px;
            }
            .menu {
                grid-template-columns: 1fr;
            }
            .menuIntro img {
                width: 90%;
            }
            .header {
                width: 95%;
                margin-top: 70px;
            }
            .logo {
                width: 150px;
                height: 150px;
            }
            h1, h2 {
                font-size: 1.5rem;
            }
        }

        /* animations */
        @keyframes windowsFly {
            0% {
                filter: blur(10px);
                opacity: 0;
                width: 0;
            }
            50% {
                filter: blur(5px);
                opacity: 0.5;
                width: 150px;
            }
            100% {
                opacity: 1;
                width: 200px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <div class="navBar" id="nv">
        <nav>
            <i class="bi bi-justify" id="hamMenu"></i>
            <ul id="navList">
                <li><a href="#" data-page="home">HOME</a></li>
                <li><a href="#" data-page="menu">MENU</a></li>
                <li><a href="#" data-page="ourstory">OUR STORY</a></li>
                <li><a href="#" data-page="contactus">CONTACT US</a></li>
                <li class="socialIcon"><a href="tel:111-111-111"><i class="bi bi-telephone-forward"></i></a></li>
                <li class="socialIcon"><a href="https://instagram.com/example" target="_blank"><i class="bi bi-instagram"></i></a></li>
                <li class="socialIcon"><a href="mailto:example@example.com"><i class="bi bi-envelope-fill"></i></a></li>
            </ul>
        </nav>
    </div>

    <!-- Main Content Area (سيتم تعبئته بواسطة JavaScript) -->
    <div class="header" id="mainContent">
        <!-- سيتم تحميل المحتوى هنا ديناميكيًا -->
    </div>

    <script>
        // بيانات الصفحات (HTML لكل صفحة)
        const pages = {
            home: `
                <div class="IntroMsg">
                    <img alt="Garcia Taverns where food meets passion" 
                         class="logo" 
                         src="https://i.ibb.co/WK9hkx8/Garcia-Tavern-logos-transparent.png" 
                         width="200" height="200">
                </div>
                <div class="IntroMsg">
                    <h1>Stunning food, Amazing Quality</h1>
                    <span>Let us host your next special occasion</span>
                    <h2>
                        <a href="tel:111-111-111" style="text-decoration: none; color: white;">
                            <i class="bi bi-telephone-forward-fill"> <span>Contact US today</span></i>
                        </a>
                    </h2>
                </div>
                <div class="menu">   
                    <div class="menuIntro">     
                        <img src="https://i.ibb.co/QCxY7FT/michael-discenza-Mxfcoxyc-H-Y-unsplash.jpg"/>
                        <img src="https://i.ibb.co/cNrYC6S/izabela-rutkowski-Nme6-Tb-Wu-Vp-A-unsplash.jpg" />
                    </div>
                    <section id="home-menu">
                        <h2>DRINK MENU</h2>
                        <h3>Sprits, wine, and beer</h3>
                        <ul>
                            <li><span class="dish">Vodka 1oz</span><span class="Price">$6</span><span class="Description">VODKA and choice of juice or soda.</span></li>
                            <li><span class="dish">Rum 1oz.</span><span class="Price">$6</span><span class="Description">RUM and choice of juice or soda.</span></li>
                            <li><span class="dish">Whisky 1oz.</span><span class="Price">$6</span><span class="Description">Whisky and choice of juice or soda.</span></li>
                            <li><span class="dish">Tequila 1oz.</span><span class="Price">$6</span><span class="Description">Tequila served with juice or soda.</span></li>
                            <li><span class="dish">Red wine.</span><span class="Price">$8</span><span class="Description">8oz Red wine, ask server for our wine selection.</span></li>
                            <li><span class="dish">White wine.</span><span class="Price">$8</span><span class="Description">8oz white wine, ask server for our wine selection.</span></li>
                            <li><span class="dish">Sparkling wine .</span><span class="Price">$12</span><span class="Description">8oz sparking wine glass of your choice.</span></li>
                            <li><span class="dish">Domestic and foreign beer .</span><span class="Price">$6 - $8</span><span class="Description">Domestic and foreign beer of you choice</span></li>
                        </ul>
                    </section>
                </div>
                <div class="menu">   
                    <div class="menuIntro">    
                        <img src="https://i.ibb.co/9g9yg5G/chad-montano-l-P5-MCM6n-Z5-A-unsplash.jpg" />  
                        <img src="https://i.ibb.co/q1HKkyL/ella-olsson-4d-Qia-WKi-L-Y-unsplash.jpg" />
                    </div>
                    <section id="home-menu">
                        <h2>FOOD MENU</h2>
                        <h3>Entrees, mains, and handhelds</h3>
                        <ul>
                            <li><span class="dish">Nachos</span><span class="Price">$12</span><span class="Description">cheese, onions, tomatoes.</span></li>
                            <li><span class="dish">Tacos.</span><span class="Price">$12</span><span class="Description">chicken or beef with your choice of side.</span></li>
                            <li><span class="dish">Chicken rice bowl.</span><span class="Price">$16</span><span class="Description">brown rice, and veggies, served with choice or sauce</span></li>
                            <li><span class="dish">Grilled chicken</span><span class="Price">$15</span><span class="Description">Juicy grilled chicken served with choice of sauce.</span></li>
                            <li><span class="dish">Steak and fired beans.</span><span class="Price">$15</span><span class="Description">Steak and your choice of side.</span></li>
                            <li><span class="dish">burrito.</span><span class="Price">$12</span><span class="Description">Your choice of beef or chicken.</span></li>
                        </ul>
                    </section>
                </div>
                <div class="menu">   
                    <div class="menuIntro">    
                        <img src="https://i.ibb.co/GJ0Q03Q/camille-paralisan-rq-NIBr-DGnh4-unsplash.jpg" />
                        <img src="https://i.ibb.co/rsxRJMX/oscar-nord-5-CPn8-NE2-Tc-unsplash.jpg" />
                    </div>
                    <section id="home-menu">
                        <h2>DESSERT MENU</h2>
                        <h3>Desserts and sweets</h3>
                        <ul>
                            <li><span class="dish">Chocolate cake .</span><span class="Price">$7</span><span class="Description">Loaded Chocolate cake with fudge topping.</span></li>
                            <li><span class="dish">NY cheesecake.</span><span class="Price">$12</span><span class="Description">NY cheesecake topped with strawberry topping.</span></li>
                            <li><span class="dish">Apple pie.</span><span class="Price">$6</span><span class="Description">Warm apple pie topped with icecream.</span></li>
                            <li><span class="dish">Churros.</span><span class="Price">$7</span><span class="Description">pancake mix, water, oil, sugar, cinnamon.</span></li>
                            <li><span class="dish">Sopaipillas</span><span class="Price">$7</span><span class="Description">Light, crispy pastry puffs, sopaipillas are a sweet way to round out a spicy meal.</span></li>
                            <li><span class="dish">Creamy Caramel Flan.</span><span class="Price">$12</span><span class="Description">A small slice of this impressively rich, creamy, caramel flan dessert goes a long way.</span></li>
                            <li><span class="dish">Shortcut Tres Leches Cake</span><span class="Price">$12</span><span class="Description">My mom's favorite cake is tres leches, a butter cake soaked in three kinds of milk.</span></li>
                            <li><span class="dish">Pressure-Cooker Pumpkin Flans</span><span class="Price">$14</span><span class="Description">This silky, smooth dessert captures the essence and elegance of fall.</span></li>
                        </ul>
                    </section>
                </div>
            `,
            menu: `<div style="text-align:center; padding:50px;"><h2>Menu Page</h2><p>Full menu content can be added here.</p></div>`,
            ourstory: `<div style="text-align:center; padding:50px;"><h2>Our Story</h2><p>Learn about Garcia Tavern...</p></div>`,
            contactus: `<div style="text-align:center; padding:50px;"><h2>Contact Us</h2><p>Phone: 111-111-111<br>Email: example@example.com</p></div>`
        };

        function loadPage(pageName) {
            const content = pages[pageName] || pages.home;
            document.getElementById('mainContent').innerHTML = content;
            // تحديث عنوان URL بدون إعادة تحميل
            history.pushState({ page: pageName }, '', `?page=${pageName}`);
        }

        function getPageFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('page') || 'home';
        }

        // التعامل مع روابط التنقل
        document.querySelectorAll('[data-page]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const page = link.getAttribute('data-page');
                loadPage(page);
                // إغلاق القائمة في وضع الجوال بعد النقر
                if (window.innerWidth <= 600) {
                    document.getElementById('navList').style.display = 'none';
                }
            });
        });

        // زر الهامبرغر
        const ham = document.getElementById('hamMenu');
        const navList = document.getElementById('navList');
        ham.addEventListener('click', () => {
            if (navList.style.display === 'block') {
                navList.style.display = 'none';
            } else {
                navList.style.display = 'block';
            }
        });

        // تحميل الصفحة المناسبة عند البدء
        window.addEventListener('load', () => {
            const initialPage = getPageFromURL();
            loadPage(initialPage);
        });

        // عند الضغط على زر الرجوع/التقدم في المتصفح
        window.addEventListener('popstate', (event) => {
            const page = event.state ? event.state.page : getPageFromURL();
            loadPage(page);
        });
    </script>

    <!-- coded by cryptograghi 2021 aka oliver shwaba  :) -->
</body>
</html>
