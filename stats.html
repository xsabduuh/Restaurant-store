<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الإنجاز اليومي | الإحصائيات</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-link">🏠 الرئيسية</a>
            <a href="stats.html" class="nav-link active">📊 الإحصائيات</a>
            <a href="achievements.html" class="nav-link">🏅 الإنجازات</a>
            <a href="settings.html" class="nav-link">⚙️ الإعدادات</a>
        </div>
    </nav>

    <div class="app-container">
        <header>
            <h1>📊 لوحة الإحصائيات المتقدمة</h1>
            <p class="subtitle">تحليل يومي وشهري لتقدمك</p>
        </header>

        <div class="dashboard">
            <!-- الرسوم البيانية -->
            <section class="card chart-section">
                <h2>📈 تقدم XP خلال آخر 7 أيام</h2>
                <canvas id="xpChart" width="400" height="200" style="max-height: 300px;"></canvas>
            </section>

            <section class="card chart-section">
                <h2>💰 تقدم الهدف المالي خلال آخر 7 أيام</h2>
                <canvas id="financeChart" width="400" height="200" style="max-height: 300px;"></canvas>
            </section>

            <!-- السجل اليومي المفصل -->
            <section class="card daily-log-section">
                <h2>📅 السجل اليومي</h2>
                <div id="dailyLogContainer" class="daily-log"></div>
            </section>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="stats.js"></script>
</body>
</html>
