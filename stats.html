<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الإنجاز اليومي | الإحصائيات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="stats.html" class="nav-link active"><i class="fas fa-chart-line"></i> الإحصائيات</a>
            <a href="achievements.html" class="nav-link"><i class="fas fa-medal"></i> الإنجازات</a>
            <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> الإعدادات</a>
        </div>
    </nav>

    <div class="container">
        <header class="glass-header">
            <h1><i class="fas fa-chart-pie"></i> لوحة الإحصائيات المتقدمة</h1>
            <p>تحليل يومي وشهري مع رسوم بيانية تفاعلية</p>
        </header>

        <div class="dashboard">
            <div class="glass-card full-width">
                <div class="card-header">
                    <i class="fas fa-chart-line"></i>
                    <h2>تقدم XP خلال آخر 7 أيام</h2>
                </div>
                <canvas id="xpChart" width="400" height="200" style="max-height: 300px;"></canvas>
            </div>

            <div class="glass-card full-width">
                <div class="card-header">
                    <i class="fas fa-chart-line"></i>
                    <h2>تقدم الهدف المالي خلال آخر 7 أيام</h2>
                </div>
                <canvas id="financeChart" width="400" height="200" style="max-height: 300px;"></canvas>
            </div>

            <div class="glass-card full-width">
                <div class="card-header">
                    <i class="fas fa-calendar-day"></i>
                    <h2>السجل اليومي التفصيلي</h2>
                </div>
                <div id="dailyLogContainer" class="daily-log"></div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="stats.js"></script>
</body>
</html>
