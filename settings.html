<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الإنجاز اليومي | الإعدادات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="stats.html" class="nav-link"><i class="fas fa-chart-line"></i> الإحصائيات</a>
            <a href="achievements.html" class="nav-link"><i class="fas fa-medal"></i> الإنجازات</a>
            <a href="settings.html" class="nav-link active"><i class="fas fa-cog"></i> الإعدادات</a>
        </div>
    </nav>

    <div class="container">
        <header class="glass-header">
            <h1><i class="fas fa-sliders-h"></i> إعدادات التطبيق</h1>
            <p>تحكم في بياناتك وتفضيلاتك</p>
        </header>

        <div class="settings-grid">
            <div class="glass-card">
                <div class="card-header">
                    <i class="fas fa-database"></i>
                    <h2>إدارة البيانات</h2>
                </div>
                <button id="exportDataBtn" class="btn-secondary"><i class="fas fa-download"></i> تصدير البيانات (JSON)</button>
                <label for="importFile" class="btn-secondary file-label"><i class="fas fa-upload"></i> استيراد بيانات</label>
                <input type="file" id="importFile" accept=".json" style="display: none;">
                <button id="resetDataBtn" class="btn-danger"><i class="fas fa-trash-alt"></i> إعادة ضبط جميع البيانات</button>
            </div>

            <div class="glass-card">
                <div class="card-header">
                    <i class="fas fa-bell"></i>
                    <h2>الإشعارات</h2>
                </div>
                <div class="toggle-setting">
                    <label class="toggle-switch">
                        <input type="checkbox" id="notificationToggle">
                        <span class="slider"></span>
                    </label>
                    <span>تذكير يومي بالمهام</span>
                </div>
                <button id="testNotificationBtn" class="btn-secondary"><i class="fas fa-bell"></i> اختبار الإشعار</button>
            </div>

            <div class="glass-card">
                <div class="card-header">
                    <i class="fas fa-palette"></i>
                    <h2>المظهر</h2>
                </div>
                <div class="toggle-setting">
                    <label class="toggle-switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="slider"></span>
                    </label>
                    <span>الوضع المظلم (Dark Mode)</span>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="settings.js"></script>
</body>
</html>
